services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: skill-forge-container
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - /app/node_modules
    stdin_open: true
    tty: true
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: rebuild
          path: package.json